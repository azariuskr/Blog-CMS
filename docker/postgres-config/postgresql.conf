#------------------------------------------------------------------------------
# PostgreSQL 18 - Optimized for REST APIs (8GB Container)
#------------------------------------------------------------------------------

#------------------------------------------------------------------------------
# CONNECTIONS
#------------------------------------------------------------------------------
max_connections = 300
superuser_reserved_connections = 3
shared_preload_libraries = 'pg_stat_statements,pg_prewarm,auto_explain'

#------------------------------------------------------------------------------
# MEMORY (8GB Container)
#------------------------------------------------------------------------------
shared_buffers = 2GB # 25% of RAM
effective_cache_size = 6GB # 75% of RAM
work_mem = 32MB # Reduced from 64MB (300 connections * 64MB = 19GB!)
maintenance_work_mem = 1GB
autovacuum_work_mem = 512MB
huge_pages = try
temp_buffers = 16MB # Reduced

# CRITICAL: work_mem calculation
# max_connections * work_mem should not exceed available RAM
# 300 * 32MB = 9.6GB (safer than 300 * 64MB = 19.2GB)

#------------------------------------------------------------------------------
# PARALLELISM & ASYNC (PostgreSQL 18)
#------------------------------------------------------------------------------
max_worker_processes = 8
max_parallel_workers = 6
max_parallel_workers_per_gather = 4
max_parallel_maintenance_workers = 4
parallel_setup_cost = 500
parallel_tuple_cost = 0.05

# Async I/O (SSD optimized)
effective_io_concurrency = 200
maintenance_io_concurrency = 100

# JIT Compilation
jit = on
jit_above_cost = 100000
jit_inline_above_cost = 500000
jit_optimize_above_cost = 500000

#------------------------------------------------------------------------------
# WAL & CHECKPOINTING
#------------------------------------------------------------------------------
wal_level = replica
max_wal_size = 8GB
min_wal_size = 2GB
checkpoint_completion_target = 0.9
checkpoint_timeout = 15min # Changed from 10min for less I/O
wal_buffers = 64MB
wal_writer_delay = 200ms # Changed from 10ms (less aggressive)
wal_writer_flush_after = 1MB

# synchronous_commit for data safety
synchronous_commit = local # CHANGED from 'off' - prevents data loss
commit_delay = 0
commit_siblings = 5

#------------------------------------------------------------------------------
# QUERY PLANNER (SSD)
#------------------------------------------------------------------------------
random_page_cost = 1.1
seq_page_cost = 1.0
cpu_tuple_cost = 0.01
cpu_index_tuple_cost = 0.005
cpu_operator_cost = 0.0025

# Advanced features
enable_partitionwise_join = on
enable_partitionwise_aggregate = on
enable_async_append = on
enable_memoize = on
enable_incremental_sort = on

#------------------------------------------------------------------------------
# BACKGROUND WRITER
#------------------------------------------------------------------------------
bgwriter_delay = 200ms # Changed from 10ms (less aggressive)
bgwriter_lru_maxpages = 100 # Changed from 1000
bgwriter_lru_multiplier = 2.0 # Changed from 10.0
bgwriter_flush_after = 512kB

#------------------------------------------------------------------------------
# AUTOVACUUM (Aggressive for OLTP)
#------------------------------------------------------------------------------
autovacuum = on
autovacuum_max_workers = 4 # Reduced from 6
autovacuum_naptime = 30s # Changed from 15s
autovacuum_vacuum_threshold = 50 # Changed from 25
autovacuum_vacuum_insert_threshold = 1000
autovacuum_analyze_threshold = 50
autovacuum_vacuum_scale_factor = 0.1 # Changed from 0.05
autovacuum_vacuum_insert_scale_factor = 0.2
autovacuum_analyze_scale_factor = 0.05 # Changed from 0.025
autovacuum_vacuum_cost_delay = 10ms # Changed from 2ms
autovacuum_vacuum_cost_limit = 400 # Changed from 2000

#------------------------------------------------------------------------------
# LOGGING
#------------------------------------------------------------------------------
log_destination = 'stderr'
logging_collector = off
# logging_collector = on
# log_directory = '/var/log/postgresql'
# log_filename = 'postgresql-%Y-%m-%d_%H%M%S.log'
log_rotation_age = 1d
log_rotation_size = 100MB
log_min_duration_statement = 1000 # Changed from 500ms
log_checkpoints = on
log_connections = off
log_disconnections = off
log_lock_waits = on
log_temp_files = 0
log_autovacuum_min_duration = 5000 # Changed from 1000ms
log_statement = 'none'
log_line_prefix = '%t [%p]: user=%u,db=%d,app=%a '

# Statistics
track_activities = on
track_counts = on
track_io_timing = on
track_wal_io_timing = on
track_functions = pl

# Auto explain
auto_explain.log_min_duration = 2000 # Changed from 1000ms
auto_explain.log_analyze = on
auto_explain.log_buffers = on
auto_explain.log_timing = off # Changed from 'on' - less overhead
auto_explain.log_triggers = on
auto_explain.log_nested_statements = on

#------------------------------------------------------------------------------
# CONNECTION & TIMEOUTS
#------------------------------------------------------------------------------
tcp_keepalives_idle = 600 # 10 minutes (changed from 5)
tcp_keepalives_interval = 60 # Changed from 30s
tcp_keepalives_count = 3
statement_timeout = 30000 # 30 seconds (FIXED: removed duplicate)
lock_timeout = 10000 # 10 seconds (changed from 30s)
idle_in_transaction_session_timeout = 60000 # 1 minute (changed from 5min)

#------------------------------------------------------------------------------
# SECURITY
#------------------------------------------------------------------------------
ssl = off # OK for local dev, enable in production!
password_encryption = scram-sha-256
row_security = on

#------------------------------------------------------------------------------
# LOCALE
#------------------------------------------------------------------------------
lc_messages = 'C'
lc_monetary = 'C'
lc_numeric = 'C'
lc_time = 'C'
default_text_search_config = 'pg_catalog.english'

#------------------------------------------------------------------------------
# ADVANCED INDEXING (Keep all enabled)
#------------------------------------------------------------------------------
enable_bitmapscan = on
enable_hashagg = on
enable_hashjoin = on
enable_indexscan = on
enable_indexonlyscan = on
enable_material = on
enable_mergejoin = on
enable_nestloop = on
enable_seqscan = on
enable_sort = on
enable_tidscan = on

#------------------------------------------------------------------------------
# LIMITS
#------------------------------------------------------------------------------
temp_file_limit = 10GB
max_files_per_process = 1000
shared_memory_type = mmap

# Replication
max_wal_senders = 3
max_replication_slots = 3
hot_standby = on
hot_standby_feedback = on

#------------------------------------------------------------------------------
# TRANSACTIONS
#------------------------------------------------------------------------------
max_prepared_transactions = 100
max_locks_per_transaction = 256
max_pred_locks_per_transaction = 256

timezone = 'UTC'
log_timezone = 'UTC'
default_transaction_isolation = 'read committed'
default_transaction_read_only = off
default_transaction_deferrable = off

listen_addresses = '*'
