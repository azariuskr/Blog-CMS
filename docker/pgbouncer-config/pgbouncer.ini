;; PgBouncer Configuration
;; Optimized for REST APIs with Transaction Pooling

[databases]
;; Database connection string
;; Format: dbname = host=... port=... dbname=... user=...
{databaseName} = host={hostName} port={postgresPort} dbname={databaseName}
* = host={hostName} port={postgresPort}

[pgbouncer]
;;;
;;; Administrative settings
;;;

;; Listen address and port
listen_addr = 0.0.0.0
listen_port = 6432

;;;
;;; Authentication settings
;;;

;; Authentication type
;; Options: pam, hba, cert, md5, scram-sha-256, plain, trust, any
auth_type = scram-sha-256

;; Authentication file (userlist.txt with SCRAM hashes)
auth_file = /etc/pgbouncer-custom/userlist.txt

;; REMOVED: auth_query (not needed with userlist.txt)
;; Using userlist.txt is simpler and more secure

;;;
;;; Pooling settings
;;;

;; Pool mode
;; Options: session, transaction, statement
;; - session: One server connection per client (default)
;; - transaction: Server connection released after each transaction (BEST FOR REST APIs)
;; - statement: Server connection released after each statement (rarely used)
pool_mode = transaction

;; Server reset query (runs after each transaction in transaction mode)
server_reset_query = DISCARD ALL

;; Server reset query timeout
server_reset_query_always = 0

;;;
;;; Connection limits
;;;

;; Maximum number of client connections
max_client_conn = 1000

;; Default pool size per user+database pair
default_pool_size = 50

;; Minimum pool size per user+database pair
min_pool_size = 10

;; Reserve pool size for high-priority connections
reserve_pool_size = 10

;; Maximum number of server connections per database
;; Protects PostgreSQL from too many connections
max_db_connections = 100

;; Maximum number of server connections per user
max_user_connections = 100

;;;
;;; Timeouts
;;;

;; Server lifetime (seconds)
;; Close server connection after this time
server_lifetime = 3600

;; Server idle timeout (seconds)
;; Close idle server connections after this time
server_idle_timeout = 600

;; Server connect timeout (seconds)
server_connect_timeout = 15

;; Client login timeout (seconds)
server_login_retry = 15

;; Query wait timeout (seconds)
;; Client query waits in queue up to this time
query_wait_timeout = 120

;; Client idle timeout (seconds)
;; Close idle client connections after this time
;; Set to 0 to disable
client_idle_timeout = 0

;; Client login timeout (seconds)
client_login_timeout = 60

;; Cancel wait timeout (seconds)
cancel_wait_timeout = 10

;;;
;;; DNS settings
;;;

;; DNS zone lookup frequency
dns_max_ttl = 15

;; DNS negative answer cache time
dns_nxdomain_ttl = 15

;; DNS lookup timeout
dns_zone_check_period = 0

;;;
;;; TCP settings
;;;

;; TCP keepalive settings
tcp_keepalive = 1
tcp_keepidle = 600
tcp_keepintvl = 60
tcp_keepcnt = 3

;; TCP user timeout (milliseconds)
tcp_user_timeout = 0

;; Socket options
so_reuseport = 0

;;;
;;; Logging
;;;

;; Log connections
log_connections = 1

;; Log disconnections
log_disconnections = 1

;; Log pooler errors
log_pooler_errors = 1

;; Log statistics
stats_period = 60

;; Verbose logging (0 = off, 1 = on)
verbose = 0

;;;
;;; Administrative access
;;;

;; Admin users (can use SHOW commands)
admin_users = admin

;; Stats users (can use SHOW STATS commands)
stats_users = admin

;;;
;;; Performance tuning
;;;

;; Application name prefix
application_name_add_host = 1

;; Disable PAGER
disable_pqexec = 0

;; Server check delay
server_check_delay = 30

;; Server check query
server_check_query = SELECT 1

;; Server fast close
server_fast_close = 0

;; Server round robin
server_round_robin = 0

;; Ignore startup parameters (for compatibility)
ignore_startup_parameters = extra_float_digits,options


;;;
;;; Security
;;;

;; Unix socket directory
;unix_socket_dir = /tmp
;unix_socket_mode = 0777
;unix_socket_group =

;; Peer ID check
;peer_id =

;;;
;;; Console access (for SHOW commands)
;;;

;; Enable console
;console_users =
;console_auth_type = md5
