# Blog CMS — Web only
# Uses shared infrastructure started by better-tanstart-template (postgres, redis, minio, mailhog, inngest).
# Run: docker-compose up -d
#
# For standalone deployment (self-contained infrastructure):
#   docker-compose -f docker-compose.yml -f docker-compose.infra.yml up -d

services:
  #------------------------------------------------------------------------------
  # Blog CMS Web App — served behind Traefik at /blog
  #------------------------------------------------------------------------------
  web:
    build: .
    container_name: blog-cms-web
    restart: unless-stopped
    env_file:
      - .env.local
    environment:
      NODE_ENV: production

      # Traefik/Tailscale public base URL
      VITE_BASE_URL: https://${TRAEFIK_HOST:-localhost}/blog
      BETTER_AUTH_URL: https://${TRAEFIK_HOST:-localhost}/blog
      INNGEST_APP_URL: https://${TRAEFIK_HOST:-localhost}/blog

      # Container-internal service hostnames (shared app-network from template project)
      # blog_cms uses direct postgres (pgbouncer is configured for blog3 only)
      DATABASE_URL: postgresql://admin:password@postgres:5432/blog_cms?sslmode=disable&application_name=blog_cms&connect_timeout=10
      USE_PGBOUNCER: "false"
      REDIS_URL: redis://:SecureRedis123!@redis:6379/1
      SMTP_HOST: mailhog
      SMTP_PORT: 1025
      MINIO_ENDPOINT: minio
      MINIO_PORT: 9000
      INNGEST_BASE_URL: http://inngest_dev:8288
    networks:
      - app-network   # shared network from template project (postgres, redis, minio, mailhog, inngest live here)
      - proxy         # Traefik reverse proxy network
    labels:
      - traefik.enable=true
      - traefik.docker.network=proxy

      # Main blog router — serves /blog/*
      - traefik.http.routers.blog-cms.rule=Host(`${TRAEFIK_HOST:-localhost}`) && PathPrefix(`/blog`)
      - traefik.http.routers.blog-cms.entrypoints=websecure
      - traefik.http.routers.blog-cms.tls=true
      - traefik.http.services.blog-cms.loadbalancer.server.port=3000

#------------------------------------------------------------------------------
# Networks — both are EXTERNAL (created by the template project)
#------------------------------------------------------------------------------
networks:
  app-network:
    external: true
    name: app-network

  proxy:
    external: true
    name: proxy
